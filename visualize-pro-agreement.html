<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visualize Pro Agreement · SkinDay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:#FAF7F2; --deep:#1C1714; --rose:#C8725A; --gold:#C9A96E;
      --hero-border:rgba(201,169,110,.25); --muted:#8A7B72; --dim:#B5A89F;
      --border:#EAE2D8;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--deep); -webkit-font-smoothing:antialiased; }
    body.zh { font-family:'Noto Serif TC','DM Sans',sans-serif; }
    body.zh .doc-body { letter-spacing:.02em; line-height:1.95; }

    nav { position:sticky; top:0; z-index:100; background:rgba(28,23,20,.96); backdrop-filter:blur(12px); border-bottom:1px solid var(--hero-border); }
    .nav-inner { display:flex; align-items:center; justify-content:space-between; max-width:1180px; margin:0 auto; padding:18px 28px; }
    .nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.55rem; font-weight:600; color:#FAF7F2; text-decoration:none; letter-spacing:.01em; }
    .nav-logo span { color:var(--gold); }
    .nav-right { display:flex; align-items:center; gap:20px; }
    .nav-back { color:var(--dim); text-decoration:none; font-size:.82rem; transition:color .2s; }
    .nav-back:hover { color:#FAF7F2; }
    .lang-toggle { display:flex; align-items:center; border:1px solid rgba(250,247,242,.28); border-radius:2px; overflow:hidden; flex-shrink:0; }
    .lang-btn { padding:6px 11px; cursor:pointer; background:none; border:none; color:rgba(250,247,242,.55); font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500; transition:background .2s,color .2s; }
    .lang-btn.active { background:rgba(250,247,242,.14); color:#FAF7F2; }
    .lang-btn:hover:not(.active) { color:var(--gold); }
    .lang-sep { width:1px; background:rgba(250,247,242,.2); align-self:stretch; }

    .page-wrap { max-width:720px; margin:0 auto; padding:72px 28px 96px; }
    .page-eyebrow { font-size:.72rem; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:1rem; }
    h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,4vw,3rem); font-weight:400; margin-bottom:.5rem; line-height:1.1; }
    .meta { font-size:.8rem; color:var(--muted); margin-bottom:2.5rem; }

    /* The document is rendered as the text it is. Not marked up, not reflowed,
       not prettified. What is displayed is byte-for-byte what a clinic's
       acceptance is recorded against, and the hash at the foot of this page is
       the hash of exactly these characters. Turning it into HTML headings would
       mean the page and the record had quietly parted company. */
    .doc-body {
      white-space:pre-wrap;
      font-size:.94rem;
      line-height:1.8;
      color:#3a3330;
    }

    .doc-foot { margin-top:3rem; padding-top:1.5rem; border-top:1px solid var(--border); }
    .doc-hash { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.7rem; color:var(--dim); word-break:break-all; }
    .doc-hash-note { font-size:.78rem; color:var(--muted); margin-bottom:.5rem; }
    .other { margin-top:1.5rem; font-size:.86rem; }
    .other a { color:var(--rose); text-decoration:none; }
    .other a:hover { text-decoration:underline; }
    .loading { color:var(--muted); font-size:.9rem; }

    footer { background:var(--deep); padding:2rem 5%; text-align:center; }
    .footer-note { font-size:.78rem; color:var(--muted); }
    .footer-note a { color:var(--dim); text-decoration:none; }
    .footer-note a:hover { color:#FAF7F2; }
  </style>
</head>
<body data-doc="visualize_pro">

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">Skin<span>Day</span></a>
    <div class="nav-right">
      <a href="/" class="nav-back" id="navBack">Back to SkinDay</a>
      <div class="lang-toggle" role="group" aria-label="Language">
        <button class="lang-btn active" id="btnEn">EN</button>
        <div class="lang-sep"></div>
        <button class="lang-btn" id="btnZh">繁中</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-eyebrow" id="eyebrow">Legal</div>
  <h1 id="docTitle">Visualize Pro Agreement</h1>
  <div class="meta" id="docMeta"></div>

  <div class="doc-body" id="docBody"><span class="loading">Loading…</span></div>

  <div class="doc-foot">
    <div class="doc-hash-note" id="hashNote"></div>
    <div class="doc-hash" id="docHash"></div>
    <div class="other" id="otherDoc"></div>
  </div>
</div>

<footer>
  <div class="footer-note">
    &#169; 2026 SkinDay &nbsp;&middot;&nbsp;
    <a href="/privacy" id="f-privacy">Privacy Policy</a> &nbsp;&middot;&nbsp;
    <a href="/terms" id="f-terms">Terms of Service</a> &nbsp;&middot;&nbsp;
    <a href="/refund" id="f-refund">Refund Policy</a>
  </div>
</footer>

<script type="module">
/* This page holds no copy of the agreement. It fetches the current version from
   the database, which is where the text lives and where its hash is computed.

   That is the point, and it is not a convenience. If this file held its own copy,
   there would be two texts: the one a clinic reads here, and the one their
   acceptance is recorded against. They would agree on the day they were written
   and drift apart on the first day someone fixed a typo in only one of them. A
   clinic's acceptance would then prove that some text existed, without proving
   which. */

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://vefldlqtyxdywbzdjuia.supabase.co';
// Public, RLS-protected anon key. The service role key never appears client-side.
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZmxkbHF0eXhkeXdiemRqdWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDAwMjgsImV4cCI6MjA4NzkxNjAyOH0.o582sXiUkB3j4FiHEA5rE3ABy_pdTeeK1PnNpNirHZA';

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = id => document.getElementById(id);

// One page, either document. /terms serves clinic_terms, /visualize-pro-agreement
// serves visualize_pro. Two files with the same logic is one file too many.
const DOC_TYPE = (document.body.dataset.doc ||
  (location.pathname.indexOf('visualize-pro') !== -1 ? 'visualize_pro' : 'clinic_terms'));

const OTHER = {
  clinic_terms:  { type:'visualize_pro', href:'/visualize-pro-agreement',
                   en:'If your clinic uses Visualize Pro, the Visualize Pro Agreement applies as well.',
                   zh:'若您的診所使用 Visualize Pro，亦適用《Visualize Pro 協議》。' },
  visualize_pro: { type:'clinic_terms', href:'/terms',
                   en:'This sits alongside the SkinDay Terms of Service.',
                   zh:'本協議與《SkinDay 服務條款》併行適用。' }
};

let doc = null;
let lang = (function(){
  try {
    const saved = localStorage.getItem('sd-lang');
    if (saved === 'zh' || saved === 'en') return saved;
    const n = (navigator.language || '').toLowerCase();
    if (n.indexOf('zh') === 0) return 'zh';
  } catch (e) {}
  return 'en';
})();

function render() {
  if (!doc) return;
  const zh = lang === 'zh';

  document.body.classList.toggle('zh', zh);
  document.documentElement.setAttribute('lang', zh ? 'zh-TW' : 'en');

  $('eyebrow').textContent = zh ? '法律聲明' : 'Legal';
  $('docTitle').textContent = doc.title;
  document.title = doc.title + ' · SkinDay';

  const when = new Date(doc.effective_at).toISOString().slice(0, 7);
  $('docMeta').textContent = zh
    ? '版本 ' + doc.version + ' · 生效日期 ' + when
    : 'Version ' + doc.version + ' · Effective ' + when;

  // Fall back to English rather than show an empty page. A missing translation is
  // a gap, not a reason to tell someone nothing.
  const body = (zh && doc.body_zh) ? doc.body_zh : doc.body;
  $('docBody').textContent = body.trim();

  $('hashNote').textContent = zh
    ? '以下為英文版全文的 sha256 指紋。診所的同意紀錄指向此指紋，因此其所同意的確切內容永遠可被驗證。已被同意的文件，其內容不可再變更。'
    : 'The sha256 fingerprint of the English text. A clinic acceptance is recorded ' +
      'against this, so what was agreed to can always be proved. The text of an ' +
      'accepted document can never be changed; a change means a new version.';
  $('docHash').textContent = doc.content_hash;

  const o = OTHER[DOC_TYPE];
  $('otherDoc').innerHTML = o
    ? (zh ? o.zh : o.en) + ' <a href="' + o.href + '">' +
      (zh ? '閱讀' : 'Read it') + '</a>'
    : '';

  $('navBack').textContent = zh ? '返回 SkinDay' : 'Back to SkinDay';
  $('f-privacy').textContent = zh ? '隱私政策' : 'Privacy Policy';
  $('f-terms').textContent = zh ? '服務條款' : 'Terms of Service';
  $('f-refund').textContent = zh ? '退款政策' : 'Refund Policy';

  $('btnEn').classList.toggle('active', !zh);
  $('btnZh').classList.toggle('active', zh);
}

function setLang(v) {
  lang = v;
  try { localStorage.setItem('sd-lang', v); } catch (e) {}
  render();
}

$('btnEn').addEventListener('click', () => setLang('en'));
$('btnZh').addEventListener('click', () => setLang('zh'));

(async () => {
  try {
    const { data, error } = await sb.rpc('get_current_agreement', { p_doc_type: DOC_TYPE });
    if (error) throw new Error(error.message);
    if (!data || !data.length) throw new Error('That document is not published.');
    doc = data[0];
    render();
  } catch (e) {
    $('docBody').textContent =
      'This document could not be loaded. Please try again, or write to hello@skinday.ca.';
    console.error(e);
  }
})();
</script>
</body>
</html>
