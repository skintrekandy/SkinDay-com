# netlify.toml for skinday.com (SkinDay-com repo)
# Place in the repo root.

[build]
  functions = "netlify/functions"
  publish   = "."

# ── STAGING / BRANCH DEPLOYS: BLOCK SEARCH INDEXING ──────────────
# Applies ONLY to branch deploys (staging--skindayglobal.netlify.app
# and any other non-production branch). Production (skinday.com) is
# unaffected and stays fully indexable.
# X-Robots-Tag is an HTTP header, so it covers every response (pages
# and function output) without editing any HTML.
[context.branch-deploy.headers]
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Deploy Previews (pull-request previews) should also stay hidden.
[context.deploy-preview.headers]
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ── CANONICAL HOST: FORCE APEX (non-www) ─────────────────────────
# All real content (directory, clinic profiles, app routes) lives on
# the apex skinday.com. GSC was indexing the homepage and marketing
# pages under BOTH www.skinday.com and skinday.com, splitting ranking
# signals across two hosts. This 301 collapses every www request onto
# the apex so Google consolidates on a single canonical host.
#
# Placed first so host canonicalization runs before the path-level
# redirects below. A www request to a .html path takes one extra hop
# (www/studio.html -> apex/studio.html -> apex/studio), which is
# acceptable and still resolves to the clean canonical URL.
[[redirects]]
  from   = "https://www.skinday.com/*"
  to     = "https://skinday.com/:splat"
  status = 301
  force  = true

# ── CLEAN URLS ───────────────────────────────────────────────────
# Redirect every *.html request to its extensionless path so the
# address bar never shows .html. Netlify still serves the underlying
# .html file at the clean path automatically (its built-in pretty-URL
# behaviour), so /studio serves studio.html, /visualize serves
# visualize.html, etc.
#
# 301 (permanent): the clean path is the canonical URL. Safe here
# because the clean paths are already confirmed working.
#
# Note: the Stripe checkout function returns users to /visualize
# (no .html), so the post-payment flow never triggers these redirects.
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301
  force  = true

[[redirects]]
  from   = "/studio.html"
  to     = "/studio"
  status = 301
  force  = true

[[redirects]]
  from   = "/visualize.html"
  to     = "/visualize"
  status = 301
  force  = true

[[redirects]]
  from   = "/contact.html"
  to     = "/contact"
  status = 301
  force  = true

[[redirects]]
  from   = "/privacy.html"
  to     = "/privacy"
  status = 301
  force  = true

[[redirects]]
  from   = "/terms.html"
  to     = "/terms"
  status = 301
  force  = true

[[redirects]]
  from   = "/refund.html"
  to     = "/refund"
  status = 301
  force  = true

[[redirects]]
  from   = "/taiwan.html"
  to     = "/taiwan"
  status = 301
  force  = true

[[redirects]]
  from   = "/guide.html"
  to     = "/guide"
  status = 301
  force  = true

# ── COUNTRY DIRECTORY REDIRECTS ──────────────────────────────────
[[redirects]]
  from   = "/canada"
  to     = "https://skinday.ca"
  status = 301
  force  = true

# ── API SHORTHAND ─────────────────────────────────────────────────
# Maps /api/* to /.netlify/functions/* so taiwan.html and other pages
# can call /api/get-clinics instead of the full function path.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/about.html"
  to     = "/about"
  status = 301
  force  = true

[[redirects]]
  from   = "/account.html"
  to     = "/account"
  status = 301
  force  = true

[[redirects]]
  from   = "/hk.html"
  to     = "/hongkong"
  status = 301
  force  = true

# ── CLINIC PROFILE PAGES (SSR) ────────────────────────────────────
# Routes /clinic/* through render-clinic-com so Googlebot sees
# server-rendered title, meta, structured data for TW + HK clinics.
# force=true overrides the static clinic.html file.
[[redirects]]
  from   = "/clinic/*"
  to     = "/.netlify/functions/render-clinic-com?slug=:splat"
  status = 200
  force  = true

# ── US DIRECTORY ──────────────────────────────────────────────────
# /us              -> state selector (us.html)
# /us/california   -> state directory (us-state.html, reads state from URL)
# /us/new-york     -> same template
[[redirects]]
  from   = "/us/california"
  to     = "/us-state.html"
  status = 200
  force  = true

[[redirects]]
  from   = "/us/new-york"
  to     = "/us-state.html"
  status = 200
  force  = true

# Any other /us/* (old nested URLs, typos) -> state selector
[[redirects]]
  from   = "/us/*"
  to     = "/us"
  status = 301
  force  = true

[[redirects]]
  from   = "/us.html"
  to     = "/us"
  status = 301
  force  = true

[[redirects]]
  from   = "/us"
  to     = "/us.html"
  status = 200
  force  = true

# ── SIMULATION LIBRARY ────────────────────────────────────────────
# /visualize/cases -> the Simulation Library page (indexable marketing
# page, separate from the gated Visualize tool).
[[redirects]]
  from   = "/visualize-cases.html"
  to     = "/visualize/cases"
  status = 301
  force  = true

[[redirects]]
  from   = "/visualize/cases"
  to     = "/visualize-cases.html"
  status = 200
  force  = true

# ── CRAWLABLE CLINIC INDEX ────────────────────────────────────────
# Server-rendered, JS-free HTML index of every clinic profile. Gives
# Googlebot a real link path to all /clinic/* pages (which otherwise
# exist only in the sitemap). Pagination via ?page=N is preserved by
# Netlify automatically on the rewrite.
[[redirects]]
  from   = "/directory"
  to     = "/.netlify/functions/directory-index"
  status = 200
  force  = true

# ── DYNAMIC SITEMAP ───────────────────────────────────────────────
# Serves all TW + HK clinic URLs + static pages from Supabase.
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap-com"
  status = 200
  force  = true
